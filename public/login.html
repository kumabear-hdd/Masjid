<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Admin Login - Masjid Assalam</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-highest": "#e0e3e5",

            "error": "#ba1a1a",
            "on-background": "#191c1e",

            "on-tertiary-fixed": "#111c2d",
            "background": "#f7f9fb",
            "surface-container-high": "#e6e8ea",
            "error-container": "#ffdad6",
            "surface-container-lowest": "#ffffff",
            "surface-dim": "#d8dadc",
            "surface-container-low": "#f2f4f6",
            "secondary-fixed-dim": "#e9c349",
            "on-secondary": "#ffffff",
            "primary-fixed": "#8ef7c4",
            "on-secondary-container": "#745c00",
            "on-error-container": "#93000a",
            "tertiary-fixed-dim": "#bcc7de",
            "primary-fixed-dim": "#72daa9",
            "tertiary-fixed": "#d8e3fb",
            "inverse-on-surface": "#eff1f3",
            "surface-container": "#eceef0",
            "on-tertiary-fixed-variant": "#3c475a",
            "outline-variant": "#bdcac0",
            "primary-container": "#00855b",
            "on-surface-variant": "#3e4942",
            "on-surface": "#191c1e",
            "secondary-fixed": "#ffe088",
            "inverse-surface": "#2d3133",
            "primary": "#006947",
            "tertiary-container": "#6a758a",
            "on-tertiary": "#ffffff",
            "on-primary-fixed": "#002113",
            "surface-tint": "#006c49",
            "on-error": "#ffffff",
            "inverse-primary": "#72daa9",
            "secondary": "#735c00",
            "secondary-container": "#fed65b",
            "surface": "#f7f9fb",
            "surface-bright": "#f7f9fb",
            "on-tertiary-container": "#fefcff",
            "on-secondary-fixed": "#241a00",
            "on-secondary-fixed-variant": "#574500",
            "tertiary": "#515c71",
            "surface-variant": "#e0e3e5"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            "stack-lg": "48px",
            "gutter": "24px",
            "stack-sm": "12px",
            "stack-md": "24px",
            "margin-desktop": "40px",
            "margin-mobile": "16px",
            "base": "8px",
            "container-max": "1200px"
          },
          fontFamily: {
            "headline-lg": ["Plus Jakarta Sans"],
            "body-lg": ["Plus Jakarta Sans"],
            "headline-lg-mobile": ["Plus Jakarta Sans"],
            "body-md": ["Plus Jakarta Sans"],
            "label-md": ["Plus Jakarta Sans"],
            "headline-sm": ["Plus Jakarta Sans"],
            "label-sm": ["Plus Jakarta Sans"],
            "headline-md": ["Plus Jakarta Sans"]
          },
          fontSize: {

            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "headline-lg-mobile": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],

  <link rel="stylesheet" href="login.css"/>
</head>
<body class="flex flex-col min-h-screen bg-background selection:bg-primary-fixed selection:text-on-primary-fixed">

  <!-- Islamic Pattern Overlay -->
  <div class="fixed inset-0 islamic-pattern z-0"></div>

  <main class="flex-grow flex items-center justify-center p-margin-mobile relative z-10">
    <div class="w-full max-w-[440px]">

      <!-- Header Identity -->
      <div class="text-center mb-stack-lg">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container/10 rounded-xl mb-4">
          <span class="material-symbols-outlined text-[40px] text-primary">mosque</span>
        </div>
        <h1 class="font-headline-md text-headline-md text-on-surface">Masjid Assalam</h1>
        <p class="font-body-md text-body-md text-on-surface-variant mt-2">Sistem Administrasi Terpadu</p>
      </div>

      <!-- Login Card -->
      <div class="bg-surface-container-lowest login-card border border-outline-variant p-8 md:p-10 rounded-xl">
        <div class="mb-8 text-center">
          <h2 class="font-headline-sm text-headline-sm text-on-surface">Masuk Admin</h2>
          <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mt-1">Portal Admin</p>
        </div>

        <form id="loginForm" class="space-y-6">
          <div class="space-y-2">
            <label class="block font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
              <input
                class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface"
                id="email"
                name="email"
                placeholder="admin@assalam.com"
                required
                type="email"
                autocomplete="username"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
              <input
                class="w-full pl-10 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface"
                id="password"
                name="password"
                placeholder="••••••••"
                required
                type="password"
                autocomplete="current-password"
              />
              <button class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button" aria-label="Tampilkan password">
                <span class="material-symbols-outlined text-[20px]">visibility</span>
              </button>
            </div>
          </div>

          <button
            class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg text-on-primary bg-primary hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-95 duration-150 shadow-sm"
            type="submit"
          >
            <span class="font-label-md text-label-md uppercase tracking-wider">Login ke Dashboard</span>
          </button>
        </form>

        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <span class="w-full border-t border-outline-variant"></span>
          </div>
          <div class="relative flex justify-center text-label-sm uppercase">
            <span class="px-2 bg-surface-container-lowest text-outline">Atau</span>
          </div>
        </div>

        <div class="text-center">
          <a class="inline-flex items-center gap-2 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="index.html">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Kembali ke Situs Utama
          </a>
        </div>
      </div>

      <p class="text-center mt-8 font-label-sm text-label-sm text-outline">
        Hanya untuk pengurus masjid
      </p>

    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 h-1.5 bg-gradient-to-r from-primary via-secondary-container to-primary"></div>

  <script src="site-config.js"></script>
<script src="api.js"></script>
  <script src="login.js"></script>

</body>
</html>
